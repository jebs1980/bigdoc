<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bigdoc Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0B2545;--teal:#1A7A5E;--cream:#FAF3E0;--warm:#F4A261;--grey:#8A9BB0;--white:#fff;--red:#C0392B}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F0F2F5;color:var(--navy);min-height:100vh}
    header{background:var(--navy);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:#FAF3E0}
    .logo span{font-weight:700}
    .badge{background:rgba(244,162,97,.2);color:var(--warm);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .6rem;border-radius:4px;margin-left:.5rem}
    .container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
    .stat-card{background:var(--white);border-radius:12px;padding:1.25rem;box-shadow:0 2px 12px rgba(11,37,69,.06)}
    .stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--navy)}
    .stat-label{font-size:.72rem;color:var(--grey);margin-top:.25rem}
    .section{background:var(--white);border-radius:12px;box-shadow:0 2px 12px rgba(11,37,69,.06);overflow:hidden;margin-bottom:1.5rem}
    .section-header{padding:1.25rem 1.5rem;border-bottom:1px solid #F0F2F5;display:flex;align-items:center;justify-content:space-between}
    .section-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600}
    table{width:100%;border-collapse:collapse}
    th{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);font-weight:400;padding:.75rem 1.5rem;text-align:left;border-bottom:1px solid #F0F2F5;white-space:nowrap}
    td{padding:.85rem 1.5rem;font-size:.85rem;border-bottom:1px solid #F8F9FA;vertical-align:middle}
    tr:hover td{background:#FAFBFC}
    .score-badge{display:inline-block;padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:500}
    .score-red{background:rgba(192,57,43,.1);color:var(--red)}
    .score-orange{background:rgba(230,126,34,.1);color:#E67E22}
    .score-yellow{background:rgba(244,162,97,.15);color:#C77B30}
    .score-green{background:rgba(26,122,94,.1);color:var(--teal)}
    .phase-badge{font-size:.7rem;padding:.15rem .5rem;border-radius:4px;background:#F0F2F5;color:var(--grey)}
    .btn-sm{padding:.3rem .75rem;border-radius:6px;font-size:.75rem;border:1px solid #E8EBF0;background:white;cursor:pointer;color:var(--navy);transition:all .15s;text-decoration:none;display:inline-block}
    .btn-sm:hover{border-color:var(--teal);color:var(--teal)}
    .empty{text-align:center;padding:3rem;color:var(--grey);font-size:.9rem}
    .filter-bar{padding:.75rem 1.5rem;border-bottom:1px solid #F0F2F5;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
    input[type=text]{padding:.4rem .75rem;border:1px solid #E8EBF0;border-radius:6px;font-size:.82rem;font-family:'DM Sans',sans-serif;width:220px}
    input[type=text]:focus{outline:none;border-color:var(--teal)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(11,37,69,.5);z-index:100;align-items:center;justify-content:center;padding:1rem}
    .modal-overlay.open{display:flex}
    .modal{background:white;border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:2rem}
    .close-btn{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--grey)}
    @media(max-width:700px){.stats-grid{grid-template-columns:1fr 1fr}.container{padding:1rem}}
  </style>
</head>
<body>

<header>
  <div class="logo">big<span>doc</span> <span class="badge">Admin</span></div>
  <div style="font-size:.75rem;color:rgba(250,243,224,.4)" id="last-refresh"></div>
</header>

<div class="container" id="content">

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-label">Diagnostics total</div></div>
    <div class="stat-card"><div class="stat-num" id="s-score">—</div><div class="stat-label">Score moyen /100</div></div>
    <div class="stat-card"><div class="stat-num" id="s-hours">—</div><div class="stat-label">Heures perdues moy.</div></div>
    <div class="stat-card"><div class="stat-num" id="s-euros">—</div><div class="stat-label">€ évitables moy./an</div></div>
  </div>

  <!-- Leads -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Diagnostics & Leads</div>
      <button onclick="loadLeads()" style="background:none;border:none;cursor:pointer;font-size:.8rem;color:var(--teal)">↻ Actualiser</button>
    </div>
    <div class="filter-bar">
      <input type="text" id="search" placeholder="Rechercher email, prénom, ville…" oninput="filterTable()"/>
      <select id="filter-phase" onchange="filterTable()" style="padding:.4rem .75rem;border:1px solid #E8EBF0;border-radius:6px;font-size:.82rem;font-family:'DM Sans',sans-serif">
        <option value="">Toutes phases</option>
        <option value="installation">Installation</option>
        <option value="consolidation">Consolidation</option>
        <option value="croissance">Croissance</option>
        <option value="transmission">Transmission</option>
      </select>
      <select id="filter-score" onchange="filterTable()" style="padding:.4rem .75rem;border:1px solid #E8EBF0;border-radius:6px;font-size:.82rem;font-family:'DM Sans',sans-serif">
        <option value="">Tous scores</option>
        <option value="urgent">0-25 Urgent</option>
        <option value="fragile">26-50 Fragile</option>
        <option value="passable">51-75 Passable</option>
        <option value="ok">76-100 OK</option>
      </select>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Email</th>
            <th>Prénom</th>
            <th>Spécialité</th>
            <th>Ville</th>
            <th>Phase</th>
            <th>Score</th>
            <th>Heures/sem</th>
            <th>€/an</th>
            <th>Palier</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leads-tbody">
          <tr><td colspan="11" class="empty">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Modal détail -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
let allLeads = [];

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const s = await r.json();
    document.getElementById('s-total').textContent = s.diagnostics_total || '0';
    document.getElementById('s-score').textContent = s.score_moyen || '—';
    document.getElementById('s-hours').textContent = (s.heures_perdues_moyennes || '—') + 'h';
    document.getElementById('s-euros').textContent = s.euros_evitables_moyens ? s.euros_evitables_moyens.toLocaleString('fr') + '€' : '—';
  } catch(e) {}
}

async function loadLeads() {
  try {
    const r = await fetch('/api/admin/leads', {
      headers: { 'X-Admin-Token': getAdminToken() }
    });
    if (r.status === 401) { showLogin(); return; }
    allLeads = await r.json();
    renderTable(allLeads);
    document.getElementById('last-refresh').textContent = 'Mis à jour ' + new Date().toLocaleTimeString('fr');
  } catch(e) {
    document.getElementById('leads-tbody').innerHTML = '<tr><td colspan="11" class="empty">Erreur de chargement</td></tr>';
  }
}

function getAdminToken() {
  return sessionStorage.getItem('bigdoc_admin_token') || '';
}

function showLogin() {
  document.getElementById('content').innerHTML = `
    <div style="max-width:360px;margin:4rem auto;background:white;border-radius:14px;padding:2rem;box-shadow:0 4px 30px rgba(11,37,69,.1)">
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;margin-bottom:1.5rem;text-align:center">Accès administrateur</h2>
      <div style="margin-bottom:1rem">
        <label style="font-size:.8rem;color:var(--grey);display:block;margin-bottom:.3rem">Identifiant</label>
        <input id="login-user" type="text" placeholder="admin" style="width:100%;padding:.75rem 1rem;border:1px solid #E8EBF0;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem"/>
      </div>
      <div style="margin-bottom:1.5rem">
        <label style="font-size:.8rem;color:var(--grey);display:block;margin-bottom:.3rem">Mot de passe</label>
        <input id="login-pass" type="password" placeholder="••••••••" style="width:100%;padding:.75rem 1rem;border:1px solid #E8EBF0;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem"
               onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button onclick="doLogin()" style="width:100%;padding:.85rem;background:var(--teal);color:white;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:pointer">
        Connexion
      </button>
      <div id="login-error" style="color:var(--red);font-size:.8rem;text-align:center;margin-top:.75rem;display:none">Identifiants incorrects</div>
    </div>
  `;
}

async function doLogin() {
  const username = document.getElementById('login-user').value;
  const password = document.getElementById('login-pass').value;
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username, password })
    });
    if (!r.ok) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    const data = await r.json();
    sessionStorage.setItem('bigdoc_admin_token', data.token);
    document.getElementById('content').innerHTML = '<div style="padding:2rem;text-align:center">Chargement…</div>';
    loadLeads();
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

function scoreBadge(score) {
  if (!score && score !== 0) return '<span style="color:var(--grey)">—</span>';
  const cls = score<=25?'score-red':score<=50?'score-orange':score<=75?'score-yellow':'score-green';
  return `<span class="score-badge ${cls}">${score}/100</span>`;
}

function renderTable(leads) {
  const tbody = document.getElementById('leads-tbody');
  if (!leads.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="empty">Aucun diagnostic pour l\'instant</td></tr>';
    return;
  }
  tbody.innerHTML = leads.map(l => `
    <tr>
      <td style="white-space:nowrap;color:var(--grey);font-size:.78rem">${l.date || '—'}</td>
      <td style="font-weight:500">${l.email || '<span style="color:var(--grey)">Anonyme</span>'}</td>
      <td>${l.prenom || '—'}</td>
      <td>${l.specialite || '—'}</td>
      <td>${l.ville || '—'}</td>
      <td><span class="phase-badge">${l.phase || '—'}</span></td>
      <td>${scoreBadge(l.score_global)}</td>
      <td>${l.heures_perdues_semaine ? l.heures_perdues_semaine + 'h' : '—'}</td>
      <td>${l.euros_evitables_an ? l.euros_evitables_an.toLocaleString('fr') + '€' : '—'}</td>
      <td style="font-size:.78rem;color:var(--teal)">${l.recommandation_palier || '—'}</td>
      <td>
        <button class="btn-sm" onclick="showDetail('${l.session_id}')">Détail</button>
      </td>
    </tr>
  `).join('');
}

function filterTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const phase = document.getElementById('filter-phase').value;
  const scoreFilter = document.getElementById('filter-score').value;

  const filtered = allLeads.filter(l => {
    const matchSearch = !search ||
      (l.email||'').toLowerCase().includes(search) ||
      (l.prenom||'').toLowerCase().includes(search) ||
      (l.ville||'').toLowerCase().includes(search) ||
      (l.specialite||'').toLowerCase().includes(search);

    const matchPhase = !phase || l.phase === phase;

    let matchScore = true;
    if (scoreFilter) {
      const s = l.score_global || 0;
      if (scoreFilter === 'urgent') matchScore = s <= 25;
      else if (scoreFilter === 'fragile') matchScore = s > 25 && s <= 50;
      else if (scoreFilter === 'passable') matchScore = s > 50 && s <= 75;
      else if (scoreFilter === 'ok') matchScore = s > 75;
    }

    return matchSearch && matchPhase && matchScore;
  });

  renderTable(filtered);
}

async function showDetail(sessionId) {
  try {
    const r = await fetch(`/api/bilan/${sessionId}`);
    const data = await r.json();
    const b = data.bilan;

    document.getElementById('modal-content').innerHTML = `
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;margin-bottom:1.5rem">Détail du diagnostic</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
        <div style="background:#F8F9FA;border-radius:8px;padding:1rem">
          <div style="font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-bottom:.25rem">Score global</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600">${b.score_global}/100</div>
          <div style="font-size:.8rem;color:var(--grey)">${b.niveau}</div>
        </div>
        <div style="background:#F8F9FA;border-radius:8px;padding:1rem">
          <div style="font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-bottom:.25rem">Impact</div>
          <div style="font-size:.9rem;font-weight:500">${b.heures_perdues_semaine}h/sem perdues</div>
          <div style="font-size:.9rem;color:var(--red)">${(b.euros_evitables_an||0).toLocaleString('fr')} €/an évitables</div>
        </div>
      </div>
      <div style="margin-bottom:1rem">
        <div style="font-size:.75rem;font-weight:500;margin-bottom:.5rem;color:var(--grey)">ORDONNANCE</div>
        <div style="font-weight:500">${b.recommandation_principale?.service}</div>
        <div style="color:var(--teal);font-size:.85rem">${b.recommandation_principale?.tarif}</div>
        <div style="font-size:.82rem;color:var(--grey);margin-top:.4rem">${b.recommandation_principale?.justification}</div>
      </div>
      ${b.alerte_urgente ? `<div style="background:rgba(192,57,43,.08);border-left:3px solid var(--red);padding:.75rem 1rem;border-radius:6px;font-size:.82rem;color:var(--red);margin-bottom:1rem">⚠️ ${b.alerte_urgente}</div>` : ''}
      <div>
        <div style="font-size:.75rem;font-weight:500;margin-bottom:.5rem;color:var(--grey)">MESSAGE BILAN</div>
        <p style="font-size:.85rem;line-height:1.6;color:var(--navy)">${b.message_bilan}</p>
      </div>
    `;
    document.getElementById('modal').classList.add('open');
  } catch(e) {
    alert('Impossible de charger ce diagnostic');
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Init
loadStats();
loadLeads();
setInterval(()=>{ loadStats(); loadLeads(); }, 60000); // refresh toutes les minutes
</script>
</body>
</html>
