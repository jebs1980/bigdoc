<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bigdoc Admin — Configuration initiale</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:#F5F3FF; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:white; border-radius:20px; padding:2.5rem; width:100%; max-width:440px; box-shadow:0 8px 40px rgba(79,70,229,.12); }
    .logo { text-align:center; margin-bottom:1.5rem; }
    .logo-text { font-size:1.6rem; font-weight:900; color:#1A1060; letter-spacing:-1px; }
    .logo-sub { font-size:.7rem; font-weight:700; color:#6366F1; letter-spacing:2px; text-transform:uppercase; }
    .badge { display:inline-block; background:#FEF3C7; color:#92400E; font-size:.72rem; font-weight:700; padding:.3rem .75rem; border-radius:999px; margin-top:.5rem; }
    h2 { font-size:1.1rem; font-weight:800; color:#1A1060; margin-bottom:.4rem; text-align:center; }
    p.desc { font-size:.82rem; color:#6B7280; text-align:center; margin-bottom:1.75rem; line-height:1.5; }
    .input-group { margin-bottom:1rem; }
    label { display:block; font-size:.8rem; font-weight:700; color:#374151; margin-bottom:.35rem; }
    input { width:100%; padding:.85rem 1rem; border:2px solid #E5E7EB; border-radius:12px; font-family:'Nunito',sans-serif; font-size:.9rem; color:#1A1060; transition:border .2s; outline:none; }
    input:focus { border-color:#6366F1; }
    .hint { font-size:.72rem; color:#9CA3AF; margin-top:.3rem; }
    .btn { width:100%; padding:1rem; background:#4F46E5; color:white; border:none; border-radius:999px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:800; cursor:pointer; transition:all .2s; margin-top:.5rem; }
    .btn:hover { background:#4338CA; }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    .msg { border-radius:10px; padding:.75rem 1rem; font-size:.82rem; font-weight:600; margin-bottom:1rem; display:none; }
    .msg.error { background:#FEF2F2; border:1px solid #FECACA; color:#DC2626; }
    .msg.success { background:#F0FDF4; border:1px solid #BBF7D0; color:#065F46; }
    .strength { height:4px; border-radius:999px; margin-top:.4rem; background:#E5E7EB; overflow:hidden; }
    .strength-bar { height:100%; border-radius:999px; transition:width .3s, background .3s; width:0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-text">bigdoc</div>
      <div class="logo-sub">Administration</div>
      <div class="badge">⚙️ Configuration initiale</div>
    </div>
    <h2>Créez votre compte admin</h2>
    <p class="desc">Cette page n'apparaît qu'une seule fois. Elle sera désactivée définitivement après la création.</p>

    <div class="msg" id="msg"></div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="vous@bigdoc.fr" autocomplete="email" />
    </div>
    <div class="input-group">
      <label>Identifiant</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" />
      <div class="hint">Utilisé pour la connexion</div>
    </div>
    <div class="input-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"
             oninput="checkStrength(this.value)" />
      <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
      <div class="hint" id="strength-text">8 caractères minimum</div>
    </div>
    <div class="input-group">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password"
             onkeydown="if(event.key==='Enter') doSetup()" />
    </div>

    <button class="btn" onclick="doSetup()" id="btn-setup">Créer mon compte admin</button>
  </div>

  <script>
    function checkStrength(pwd) {
      const bar = document.getElementById('strength-bar');
      const text = document.getElementById('strength-text');
      let score = 0;
      if (pwd.length >= 8) score++;
      if (pwd.length >= 12) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const levels = [
        {w:'0%', bg:'#E5E7EB', t:'Trop court'},
        {w:'25%', bg:'#EF4444', t:'Faible'},
        {w:'50%', bg:'#F59E0B', t:'Moyen'},
        {w:'75%', bg:'#6366F1', t:'Bon'},
        {w:'100%', bg:'#10B981', t:'Excellent'},
      ];
      const l = levels[Math.min(score, 4)];
      bar.style.width = l.w; bar.style.background = l.bg;
      text.textContent = l.t;
    }

    async function doSetup() {
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn-setup');

      msg.style.display = 'none';

      if (!email || !username || !password) {
        msg.className='msg error'; msg.textContent='Tous les champs sont obligatoires.'; msg.style.display='block'; return;
      }
      if (password.length < 8) {
        msg.className='msg error'; msg.textContent='Mot de passe trop court (8 caractères minimum).'; msg.style.display='block'; return;
      }
      if (password !== confirm) {
        msg.className='msg error'; msg.textContent='Les mots de passe ne correspondent pas.'; msg.style.display='block'; return;
      }

      btn.disabled = true; btn.textContent = 'Création…';

      try {
        const resp = await fetch('/api/admin/setup', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, username, password})
        });
        const data = await resp.json();
        if (resp.ok) {
          msg.className='msg success';
          msg.textContent='Compte créé ! Redirection vers la connexion…';
          msg.style.display='block';
          setTimeout(() => window.location.href='/admin/login', 1500);
        } else {
          msg.className='msg error'; msg.textContent=data.detail||'Erreur'; msg.style.display='block';
          btn.disabled=false; btn.textContent='Créer mon compte admin';
        }
      } catch(e) {
        msg.className='msg error'; msg.textContent='Erreur réseau'; msg.style.display='block';
        btn.disabled=false; btn.textContent='Créer mon compte admin';
      }
    }
  </script>
</body>
</html>
