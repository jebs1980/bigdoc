<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Votre bilan Bigdoc</title>
  <meta name="description" content="Votre ordonnance personnalisée pour votre cabinet médical."/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#0B2545;--navy2:#163766;--teal:#1A7A5E;--teal-l:#22A37D;
      --cream:#FAF3E0;--warm:#F4A261;--red:#C0392B;--grey:#8A9BB0;--white:#FFFFFF;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh}
    header{background:var(--navy);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between}
    .loading{text-align:center;padding:6rem 2rem}
    .loading-circle{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--teal));margin:0 auto 2rem;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.8}}
    .card{background:var(--white);border-radius:16px;box-shadow:0 4px 40px rgba(11,37,69,.1);max-width:660px;margin:2rem auto 4rem;overflow:hidden;position:relative;z-index:1}
    .error-box{text-align:center;padding:4rem 2rem}
    .alerte{background:rgba(192,57,43,.08);border-left:3px solid var(--red);border-radius:8px;padding:1rem 1.25rem;margin:0 2.5rem 1.5rem;font-size:.88rem;color:var(--red);line-height:1.5}
    .share-banner{background:rgba(26,122,94,.06);border-top:1px solid rgba(26,122,94,.15);padding:1rem 2.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
    .btn-share{padding:.5rem 1.25rem;background:var(--teal);color:white;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s}
    .btn-share:hover{background:var(--teal-l)}
    @media(max-width:600px){.card{margin:1rem;}}
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <svg width="34" height="34" viewBox="0 0 54 54" fill="none">
      <rect width="54" height="54" rx="12" fill="#163766"/>
      <polyline points="4,27 15,27 19,11 23,43 28,20 32,27 50,27" stroke="#FAF3E0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="19" cy="11" r="3" fill="#F4A261"/>
    </svg>
    <div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;line-height:1">
        <span style="font-weight:300;color:#FAF3E0">big</span><span style="font-weight:700;color:#FAF3E0">doc</span>
      </div>
      <div style="font-size:.5rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:rgba(250,243,224,.4);margin-top:1px">un service RMS</div>
    </div>
  </div>
  <a href="/" style="color:rgba(250,243,224,.5);font-size:.8rem;font-weight:300;text-decoration:none">Faire mon diagnostic →</a>
</header>

<div id="content">
  <div class="loading">
    <div class="loading-circle"></div>
    <p style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--navy)">Chargement de votre bilan…</p>
  </div>
</div>

<script>
const dimLabels = {
  administration:'Administration & CPAM',achats_materiel:'Matériel & Stocks',
  informatique:'Informatique & Infrastructure',comptabilite:'Comptabilité & Finances',
  charge_mentale:'Charge mentale hors soins',financement:'Financement & Investissements',
  developpement:'Développement & Croissance'
};

async function loadBilan() {
  const path = window.location.pathname;
  let url;

  if (path.startsWith('/partage/')) {
    const token = path.split('/partage/')[1];
    url = `/api/partage/${token}`;
  } else if (path.startsWith('/bilan/')) {
    const sessionId = path.split('/bilan/')[1];
    url = `/api/bilan/${sessionId}`;
  } else {
    showError('Lien invalide.');
    return;
  }

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('Non trouvé');
    const data = await r.json();
    renderBilan(data.bilan);
    renderCTA(data.bilan);
    // Bouton rapport PDF
    const btnRapport = document.getElementById('btn-rapport');
    if (btnRapport) btnRapport.href = `/api/rapport/${sessionId}`;
  } catch(e) {
    showError('Ce bilan n\'existe pas ou a expiré.');
  }
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="error-box">
        <div style="font-size:2rem;margin-bottom:1rem">🔍</div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;margin-bottom:.75rem">Bilan introuvable</h2>
        <p style="color:var(--grey);font-size:.9rem;margin-bottom:1.5rem">${msg}</p>
        <a href="/" style="display:inline-block;padding:.75rem 2rem;background:var(--teal);color:white;border-radius:8px;text-decoration:none;font-size:.9rem">Faire mon diagnostic</a>
      </div>
    </div>
  `;
}

function renderRadar(dims) {
  const keys = ['administration','achats_materiel','informatique_teleconsult','comptabilite_finances','charge_mentale','financement_investissements','developpement_croissance'];
  const labels = ['Admin','Matériel','Informatique','Comptabilité','Charge','Financement','Développement'];
  const n = keys.length;
  const cx = 160, cy = 155, r = 110;
  const scores = keys.map(k => (dims[k]?.score || 0) / 20);

  // Polygone de fond (niveaux)
  function polygon(factor) {
    return keys.map((_, i) => {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = cx + r * factor * Math.cos(angle);
      const y = cy + r * factor * Math.sin(angle);
      return `${x},${y}`;
    }).join(' ');
  }

  // Polygone des scores
  const scorePoly = keys.map((k, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const val = scores[i];
    const x = cx + r * val * Math.cos(angle);
    const y = cy + r * val * Math.sin(angle);
    return `${x},${y}`;
  }).join(' ');

  // Axes
  const axes = keys.map((_, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    return `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#E8EBF0" stroke-width="1"/>`;
  }).join('');

  // Labels
  const labelEls = labels.map((lbl, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const lx = cx + (r + 22) * Math.cos(angle);
    const ly = cy + (r + 22) * Math.sin(angle);
    const score = Math.round((scores[i]) * 20);
    const col = scores[i] <= 0.35 ? '#C0392B' : scores[i] <= 0.65 ? '#E67E22' : '#1A7A5E';
    return `
      <text x="${lx}" y="${ly - 4}" text-anchor="middle" font-family="DM Sans,Arial" font-size="8.5" fill="#0B2545" font-weight="500">${lbl}</text>
      <text x="${lx}" y="${ly + 9}" text-anchor="middle" font-family="DM Sans,Arial" font-size="9" fill="${col}" font-weight="700">${score}/20</text>`;
  }).join('');

  return `
    <svg viewBox="0 0 320 310" width="100%" style="max-width:340px;margin:0 auto;display:block">
      <!-- Grille -->
      <polygon points="${polygon(0.25)}" fill="none" stroke="#F0F2F5" stroke-width="1"/>
      <polygon points="${polygon(0.5)}"  fill="none" stroke="#E8EBF0" stroke-width="1"/>
      <polygon points="${polygon(0.75)}" fill="none" stroke="#E0E4E8" stroke-width="1"/>
      <polygon points="${polygon(1)}"    fill="none" stroke="#D0D5DE" stroke-width="1"/>
      <!-- Axes -->
      ${axes}
      <!-- Score -->
      <polygon points="${scorePoly}" fill="rgba(26,122,94,.12)" stroke="#1A7A5E" stroke-width="2" stroke-linejoin="round"/>
      <!-- Points -->
      ${keys.map((k, i) => {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        const val = scores[i];
        const px = cx + r * val * Math.cos(angle);
        const py = cy + r * val * Math.sin(angle);
        const col = val <= 0.35 ? '#C0392B' : val <= 0.65 ? '#E67E22' : '#1A7A5E';
        return `<circle cx="${px}" cy="${py}" r="4" fill="${col}" stroke="white" stroke-width="1.5"/>`;
      }).join('')}
      <!-- Labels -->
      ${labelEls}
    </svg>`;
}

function contextStats(dims) {
  const ALL_STATS = {
    administration: [
      { val: "71%", label: "des médecins jugent leur charge admin excessive", source: "URPS IDF 2023 — 3 420 médecins", color: "#EF4444" },
      { val: "11,4h", label: "perdues/sem en moyenne sur des tâches non médicales", source: "CNOM Atlas 2023", color: "#F59E0B" },
      { val: "185€", label: "coût moyen d'un rejet CPAM non traité", source: "CPAM — Rapport contrôle médical 2022", color: "#F59E0B" },
    ],
    informatique_teleconsult: [
      { val: "18%", label: "des téléconsultations se font sur plateforme non agréée", source: "Ameli Open Data 2023", color: "#EF4444" },
      { val: "62%", label: "des cabinets n'ont pas de logiciel certifié HDS", source: "ANS — Observatoire numérique 2023", color: "#F59E0B" },
      { val: "+22%", label: "de croissance des téléconsultations en 2023", source: "Ameli — 18,2M d'actes", color: "#10B981" },
    ],
    comptabilite_finances: [
      { val: "54%", label: "des médecins estiment leur revenu insuffisant", source: "URPS IDF + Occitanie 2022-2023", color: "#EF4444" },
      { val: "42%", label: "du BNC part en charges sociales en moyenne", source: "CARMF 2023", color: "#F59E0B" },
    ],
    charge_mentale: [
      { val: "50%", label: "des médecins libéraux en risque élevé de burnout", source: "FMF / CNOM 2023", color: "#EF4444" },
      { val: "46%", label: "envisagent une réduction d'activité dans les 5 ans", source: "URPS IDF 2023", color: "#F59E0B" },
    ],
    achats_materiel: [
      { val: "23%", label: "des cabinets ont une panne majeure par an", source: "URPS enquêtes régionales 2022", color: "#F59E0B" },
      { val: "8,5 ans", label: "âge moyen du parc équipement en libéral", source: "URPS 2022", color: "#6366F1" },
    ],
    developpement_croissance: [
      { val: "903", label: "CPTS actives — 92% du territoire couvert", source: "DGOS — Ma Santé 2022 — oct. 2023", color: "#10B981" },
      { val: "38%", label: "des médecins envisagent de rejoindre une CPTS", source: "URPS IDF 2023", color: "#6366F1" },
      { val: "6,7M", label: "de patients sans médecin traitant en France", source: "Ameli — Q3 2023", color: "#EF4444" },
    ],
    financement_investissements: [
      { val: "50 000€", label: "d'aide CAIM en zone sous-dotée (5 ans)", source: "ARS — Contrat d'Aide à l'Installation 2024", color: "#10B981" },
      { val: "85 000€", label: "coût moyen d'installation d'un cabinet libéral", source: "CNOM Atlas 2023", color: "#6366F1" },
    ],
  };

  // Sélectionner les stats des dimensions les plus critiques (score ≤ 12)
  const critical = Object.entries(dims)
    .filter(([,d]) => (d.score||0) <= 12)
    .sort(([,a],[,b]) => (a.score||0) - (b.score||0))
    .slice(0, 3)
    .map(([k]) => k);

  // Si aucune dimension critique, prendre les 2 plus faibles
  const keys = critical.length > 0 ? critical :
    Object.entries(dims)
      .sort(([,a],[,b]) => (a.score||0) - (b.score||0))
      .slice(0, 2)
      .map(([k]) => k);

  const stats = [];
  keys.forEach(k => {
    const s = ALL_STATS[k];
    if (s) stats.push(...s.slice(0, 2));
  });

  // Toujours ajouter une stat positive si peu de stats
  if (stats.length < 3) {
    stats.push({ val: "49j", label: "délai moyen d'accès à un spécialiste en France", source: "Ameli — Observatoire accès aux soins 2023", color: "#6366F1" });
  }

  return stats.slice(0, 6).map(s => `
    <div style="background:white;border-radius:12px;padding:.9rem 1rem;border:1px solid #EDE9FE">
      <div style="font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;color:${s.color};line-height:1;letter-spacing:-1px;margin-bottom:.25rem">${s.val}</div>
      <div style="font-size:.8rem;color:#1A1060;font-weight:600;line-height:1.35;margin-bottom:.35rem">${s.label}</div>
      <div style="font-size:.65rem;color:#9CA3AF;font-weight:500">${s.source}</div>
    </div>`).join('');
}

function renderBilan(b) {
  const score = b.score_global;
  const scoreColor = score<=25?'#C0392B':score<=50?'#E67E22':score<=75?'#F4A261':'#1A7A5E';
  const isPartage = window.location.pathname.startsWith('/partage/');

  const dimsHtml = Object.entries(b.dimensions||{}).map(([key,dim])=>{
    const pct = Math.round((dim.score/20)*100);
    const color = pct<=35?'#C0392B':pct<=65?'#E67E22':'#1A7A5E';
    return `
      <div style="margin-bottom:1.25rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem">
          <span style="font-size:.82rem;font-weight:500">${dimLabels[key]||key}</span>
          <span style="font-size:.82rem;color:${color};font-weight:600">${dim.score}/20</span>
        </div>
        <div style="height:6px;background:#EEF0F4;border-radius:3px">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:3px"></div>
        </div>
        ${dim.commentaire?`<p style="font-size:.78rem;color:#8A9BB0;margin-top:.3rem;line-height:1.5">${dim.commentaire}</p>`:''}
      </div>`;
  }).join('');

  const recoSecHtml = (b.recommandations_secondaires||[]).slice(0,2).map(r=>`
    <div style="display:flex;align-items:flex-start;gap:.75rem;padding:.75rem;background:#F8F9FA;border-radius:8px;margin-bottom:.5rem">
      <span style="color:var(--teal)">→</span>
      <div>
        <strong style="font-size:.85rem">${r.service}</strong>
        <span style="color:var(--grey);font-size:.82rem"> · ${r.tarif}</span>
        <p style="font-size:.78rem;color:var(--grey);margin-top:.2rem">${r.raison}</p>
      </div>
    </div>`).join('');

  const quickHtml = (b.quick_wins||[]).map(w=>
    `<li style="font-size:.85rem;padding:.4rem 0;border-bottom:1px solid #F0F2F5">${w}</li>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      ${isPartage?`<div style="background:rgba(99,102,241,.08);padding:.75rem 1.5rem;text-align:center;font-size:.8rem;color:#4F46E5;font-weight:600">
        Ce bilan a été partagé avec vous · <a href="/" style="color:#4F46E5">Faire mon propre diagnostic →</a>
      </div>`:''}

      <!-- HEADER SCORE -->
      <div style="background:#1A1060;padding:2.5rem 2rem 2rem;text-align:center">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%;border:5px solid ${scoreColor};background:rgba(255,255,255,.06);margin-bottom:1.25rem">
          <div>
            <div style="font-family:'Nunito',sans-serif;font-size:3rem;font-weight:900;color:${scoreColor};line-height:1;letter-spacing:-2px">${score}</div>
            <div style="font-size:.65rem;color:rgba(200,200,255,.5);letter-spacing:2px;font-weight:700;text-transform:uppercase">/100</div>
          </div>
        </div>
        <div style="font-family:'Nunito',sans-serif;font-size:1.4rem;font-weight:900;color:white;margin-bottom:1.25rem;letter-spacing:-.5px">${b.niveau}</div>
        <div style="display:flex;justify-content:center;gap:1rem;flex-wrap:wrap">
          <div style="background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:.6rem 1.1rem;min-width:100px">
            <div style="font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;color:#FCA5A5;line-height:1;letter-spacing:-1px">${b.heures_perdues_semaine}h</div>
            <div style="font-size:.68rem;color:rgba(252,165,165,.8);font-weight:600;margin-top:2px">perdues / semaine</div>
          </div>
          <div style="background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);border-radius:10px;padding:.6rem 1.1rem;min-width:100px">
            <div style="font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;color:#FCD34D;line-height:1;letter-spacing:-1px">${(b.euros_evitables_an||0).toLocaleString('fr')} €</div>
            <div style="font-size:.68rem;color:rgba(252,211,77,.8);font-weight:600;margin-top:2px">récupérables / an</div>
          </div>
        </div>
      </div>

      <!-- DR BIGDOC MESSAGE — fond blanc, texte lisible -->
      <div style="padding:1.5rem 2rem;background:white;border-bottom:1px solid #EDE9FE;display:flex;align-items:flex-start;gap:1rem">
        <svg width="44" height="44" viewBox="0 0 56 56" fill="none" style="flex-shrink:0;margin-top:2px">
          <circle cx="28" cy="28" r="26" fill="#4F46E5"/>
          <ellipse cx="28" cy="24" rx="12" ry="13" fill="#F5D5A8"/>
          <ellipse cx="22" cy="23" rx="4" ry="4.5" fill="white"/><ellipse cx="34" cy="23" rx="4" ry="4.5" fill="white"/>
          <circle cx="23" cy="24" r="2.8" fill="#1A1060"/><circle cx="35" cy="24" r="2.8" fill="#1A1060"/>
          <circle cx="24" cy="22" r="1.3" fill="white"/><circle cx="36" cy="22" r="1.3" fill="white"/>
          <path d="M21 33 Q28 39 35 33" fill="#C07050"/>
          <path d="M21 33 Q28 38 35 33 Q28 37 21 33Z" fill="white"/>
          <ellipse cx="18" cy="29" rx="7" ry="4.5" fill="#FFB3A0" opacity="0.6"/>
          <ellipse cx="38" cy="29" rx="7" ry="4.5" fill="#FFB3A0" opacity="0.6"/>
          <path d="M17 19 Q23 14 28 17 Q33 14 39 19 Q34 10 28 12 Q22 10 17 19Z" fill="#1A0A00"/>
        </svg>
        <div style="flex:1">
          <div style="font-size:.62rem;font-weight:800;color:#6366F1;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.4rem">Dr Bigdoc · RMS</div>
          <p style="font-size:.92rem;color:#1A1060;line-height:1.7;margin:0;font-weight:500">${b.message_bilan||''}</p>
        </div>
      </div>

      ${b.alerte_urgente?`<div style="background:rgba(239,68,68,.08);border-left:4px solid #EF4444;padding:1rem 1.5rem;margin:0;font-size:.88rem;color:#DC2626;line-height:1.55;font-weight:600">⚠️ ${b.alerte_urgente}</div>`:''}

      <!-- RADAR -->
      <div style="padding:1.75rem 2rem 1rem;border-bottom:1px solid #EDE9FE;text-align:center">
        <div style="font-size:.65rem;font-weight:800;color:#6366F1;letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem;text-align:left">PROFIL RADAR</div>
        ${renderRadar(b.dimensions||{})}
      </div>

      <!-- CONTEXTE NATIONAL — stats sourcées selon dimensions critiques -->
      <div style="padding:1.5rem 2rem;border-bottom:1px solid #EDE9FE;background:#FAFAFE">
        <div style="font-size:.65rem;font-weight:800;color:#6366F1;letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem">VOUS N'ÊTES PAS SEUL — LES CHIFFRES</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.75rem">
          ${contextStats(b.dimensions||{})}
        </div>
      </div>

      <!-- DIMENSIONS -->
      <div style="padding:1.75rem 2rem 2rem;border-bottom:1px solid #EDE9FE">
        <div style="font-size:.65rem;font-weight:800;color:#6366F1;letter-spacing:2px;text-transform:uppercase;margin-bottom:1.25rem">BILAN PAR DIMENSION</div>
        ${dimsHtml}
      </div>

      <div style="padding:2rem;background:rgba(99,102,241,.04);border-bottom:1px solid #EDE9FE">
        <div style="font-size:.65rem;font-weight:800;color:#6366F1;letter-spacing:2px;text-transform:uppercase;margin-bottom:.75rem">ORDONNANCE BIGDOC</div>
        <div style="font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;color:#1A1060;margin-bottom:.35rem">${b.recommandation_principale?.service||''}</div>
        <div style="font-size:.88rem;color:#6366F1;font-weight:700;margin-bottom:.75rem">${b.recommandation_principale?.tarif||''}</div>
        <p style="font-size:.85rem;color:#374151;line-height:1.65;margin-bottom:1.25rem">${b.recommandation_principale?.justification||''}</p>
        ${recoSecHtml}
      </div>

      <div style="padding:2rem;border-bottom:1px solid #EDE9FE">
        <div style="font-size:.65rem;font-weight:800;color:#6366F1;letter-spacing:2px;text-transform:uppercase;margin-bottom:.75rem">3 ACTIONS CETTE SEMAINE</div>
        <ul style="list-style:none">${quickHtml}</ul>
      </div>

      <div style="padding:2rem;text-align:center">
        <p style="font-size:.9rem;color:#374151;margin-bottom:1.25rem;font-weight:500">Prêt à traiter votre cabinet ?</p>
        <div id="cta-buttons" style="display:flex;flex-direction:column;gap:.75rem;align-items:center;max-width:320px;margin:0 auto">
          <div style="width:100%;height:44px;background:#EEF0F4;border-radius:999px;animation:pulse 1.5s ease-in-out infinite"></div>
        </div>
        <p style="font-size:.75rem;color:#9CA3AF;margin-top:1rem" id="cta-sub"></p>
      </div>

      <div style="padding:1.25rem 2rem;background:#F5F3FF;border-top:1px solid #EDE9FE;text-align:center">
        <a id="btn-rapport" href="#" target="_blank"

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(()=>alert('Lien copié !')).catch(()=>prompt('Copiez ce lien :',window.location.href));
}

async function renderCTA(bilan) {
  try {
    const [settingsRes, productsRes] = await Promise.all([
      fetch('/api/public-settings'),
      fetch('/api/products')
    ]);
    const settings = await settingsRes.json();
    const products = await productsRes.json();

    const score = bilan.score_global || 0;
    const seuilRdv = settings.seuil_rdv || 50;
    const calendly = settings.calendly_url || '';
    const emailContact = settings.email_contact || 'bonjour@bigdoc.fr';
    const tel = settings.telephone || '';

    const container = document.getElementById('cta-buttons');
    const sub = document.getElementById('cta-sub');

    // Trouver le produit correspondant à la recommandation
    const recoNom = bilan.recommandation_principale?.service || '';
    const product = products.find(p =>
      p.nom.toLowerCase().includes(recoNom.toLowerCase().slice(0,10)) ||
      recoNom.toLowerCase().includes(p.nom.toLowerCase().slice(0,10))
    ) || products.find(p => p.actif);

    const forcerRdv = score < seuilRdv;
    const bouton = product?.bouton || 'rdv';
    const prixCents = product?.prix_cents || 0;
    const productId = product?.id || null;

    // Si Stripe configuré + produit valide + score suffisant → bouton payer
    if (bouton === 'payer' && prixCents > 0 && productId && !forcerRdv) {
      const prix = (prixCents / 100).toLocaleString('fr') + '€';
      container.innerHTML = `
        <button onclick="goToStripe('${productId}')"
          style="width:100%;padding:1rem;background:linear-gradient(135deg,var(--teal),var(--teal-l));
                 color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;
                 font-size:1rem;font-weight:500;cursor:pointer">
          Payer maintenant — ${prix} →
        </button>
        ${calendly ? `<a href="${calendly}" target="_blank"
          style="font-size:.82rem;color:var(--teal);text-decoration:none">
          Ou prendre un RDV gratuit de 15 min →
        </a>` : ''}
      `;
      sub.textContent = 'Paiement sécurisé par Stripe · Satisfaction garantie';

    // Si Calendly configuré → bouton RDV
    } else if (calendly) {
      container.innerHTML = `
        <a href="${calendly}" target="_blank"
          style="display:block;width:100%;padding:1rem;background:linear-gradient(135deg,var(--teal),var(--teal-l));
                 color:white;border-radius:10px;text-decoration:none;font-family:'DM Sans',sans-serif;
                 font-size:1rem;font-weight:500;text-align:center">
          Prendre un RDV gratuit 15 min →
        </a>
      `;
      sub.textContent = 'Entretien gratuit · Sans engagement · On vous rappelle sous 24h';

    // Fallback → email direct
    } else {
      container.innerHTML = `
        <a href="mailto:${emailContact}?subject=Demande suite diagnostic Bigdoc"
          style="display:block;width:100%;padding:1rem;background:linear-gradient(135deg,var(--teal),var(--teal-l));
                 color:white;border-radius:10px;text-decoration:none;font-family:'DM Sans',sans-serif;
                 font-size:1rem;font-weight:500;text-align:center">
          Contacter Bigdoc →
        </a>
        ${tel ? `<a href="tel:${tel}" style="font-size:.85rem;color:var(--teal);text-decoration:none;margin-top:.25rem;display:block;text-align:center">${tel}</a>` : ''}
      `;
      sub.textContent = emailContact;
    }
  } catch(e) {
    document.getElementById('cta-buttons').innerHTML = `
      <a href="mailto:bonjour@bigdoc.fr?subject=Demande suite diagnostic Bigdoc"
        style="display:block;width:100%;padding:1rem;background:linear-gradient(135deg,var(--teal),var(--teal-l));
               color:white;border-radius:10px;text-decoration:none;font-size:1rem;font-weight:500;text-align:center;font-family:'DM Sans',sans-serif">
        Contacter Bigdoc →
      </a>`;
  }
}

async function goToStripe(productId) {
  const sessionId = new URLSearchParams(window.location.search).get('session') || '';
  try {
    const r = await fetch('/api/create-checkout', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session_id: sessionId, produit: productId })
    });
    const data = await r.json();
    if (data.checkout_url) window.location.href = data.checkout_url;
    else alert('Erreur lors de la création du paiement');
  } catch(e) {
    alert('Erreur réseau');
  }
}
